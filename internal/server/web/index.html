<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloader - 下载管理器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .progress-bar { transition: width 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
    <div class="max-w-5xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="flex items-center justify-between mb-8">
            <div class="flex items-center space-x-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10" />
                    </svg>
                </div>
                <h1 class="text-2xl font-bold tracking-tight">Downloader <span class="text-blue-600">Web</span></h1>
            </div>
            <div class="flex items-center space-x-4">
                
                <div id="statusIndicator" class="flex items-center space-x-2 px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm font-medium">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span>已连接</span>
                </div>
                <button id="settingsBtn" class="p-2 text-gray-500 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="设置">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Stats Overview -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <p class="text-sm font-medium text-gray-500 mb-1">正在下载</p>
                <p id="activeCount" class="text-3xl font-bold">0</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <p class="text-sm font-medium text-gray-500 mb-1">总下载速度</p>
                <p id="totalSpeed" class="text-3xl font-bold">0 MB/s</p>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                <p class="text-sm font-medium text-gray-500 mb-1">已完成</p>
                <p id="completedCount" class="text-3xl font-bold">0</p>
            </div>
        </div>

        <!-- Add Download Section -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-8">
            <h2 class="text-lg font-semibold mb-4">添加新下载</h2>
            <form id="addDownloadForm" class="flex gap-2">
                <input type="text" id="urlInput" placeholder="输入下载链接 (URL)" class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition-colors">添加</button>
            </form>
        </div>

        <!-- Downloads List -->
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                <h2 class="font-semibold text-gray-700">任务列表</h2>
                <div class="flex items-center space-x-2">
                    <button id="clearHistoryBtn" class="hidden text-xs font-medium text-red-500 hover:text-red-700 px-3 py-1 rounded-md hover:bg-red-50 transition-colors mr-2">清空历史</button>
                    <button id="showActive" class="text-sm font-medium text-blue-600 hover:text-blue-700 px-3 py-1 rounded-md bg-blue-50">正在下载</button>
                    <button id="showHistory" class="text-sm font-medium text-gray-500 hover:text-gray-700 px-3 py-1 rounded-md hover:bg-gray-100">历史记录</button>
                </div>
            </div>
            <div id="downloadList" class="divide-y divide-gray-100">
                <!-- Downloads will be inserted here -->
                <div id="emptyListState" class="p-12 text-center text-gray-500">
                    <p>暂无下载任务</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-xl shadow-xl max-w-2xl w-full mx-4 overflow-hidden flex flex-col max-h-[90vh]">
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h2 class="text-xl font-bold">设置</h2>
                <button id="closeSettings" class="text-gray-400 hover:text-gray-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="p-6 overflow-y-auto">
                <form id="settingsForm" class="space-y-6">
                    <!-- General Settings -->
                    <section>
                        <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4">常规设置</h3>
                        <div class="grid grid-cols-1 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">授权令牌</label>
                                <div class="flex gap-2">
                                    <input id="authTokenDisplay" type="text" readonly class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                                    <button type="button" id="copyAuthToken" class="px-3 py-2 border border-gray-300 rounded-lg bg-gray-100 hover:bg-gray-200 text-sm w-20">复制</button>
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">默认下载目录</label>
                                <input type="text" name="general.default_download_dir" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                            </div>
                            <div class="flex items-center justify-between">
                                <label class="text-sm font-medium text-gray-700">下载完成通知</label>
                                <input type="checkbox" name="general.download_complete_notification" class="w-4 h-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                            </div>
                            <div class="flex items-center justify-between">
                                <label class="text-sm font-medium text-gray-700">自动恢复下载</label>
                                <input type="checkbox" name="general.auto_resume" class="w-4 h-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                            </div>
                        </div>
                    </section>

                    <!-- Network Settings -->
                    <section>
                        <h3 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-4">网络设置</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">最大并发下载数</label>
                                <input type="number" name="network.max_concurrent_downloads" min="1" max="10" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">每个任务最大连接数</label>
                                <input type="number" name="network.max_connections_per_host" min="1" max="64" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-sm font-medium text-gray-700 mb-1">代理服务器 (URL)</label>
                                <input type="text" name="network.proxy_url" placeholder="http://127.0.0.1:8080" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                            </div>
                        </div>
                    </section>
                </form>
            </div>
            <div class="px-6 py-4 border-t border-gray-100 bg-gray-50 flex justify-end space-x-3">
                <button id="cancelSettings" class="px-4 py-2 text-sm font-medium text-gray-600 hover:text-gray-800 transition-colors">取消</button>
                <button id="saveSettings" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg text-sm font-medium transition-colors">保存设置</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;
        // AUTH_TOKEN will be injected here
        const KB = 1024;
        const MB = KB * 1024;
        const GB = MB * 1024;

        let activeDownloads = new Map();
        let historyDownloads = [];
        let currentView = 'active';

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            if (bytes < KB) return bytes + ' B';
            if (bytes < MB) return (bytes / KB).toFixed(2) + ' KB';
            if (bytes < GB) return (bytes / MB).toFixed(2) + ' MB';
            return (bytes / GB).toFixed(2) + ' GB';
        }

        function formatSpeed(mbps) {
            if (mbps === 0) return '0 KB/s';
            if (mbps < 1) {
                return (mbps * 1024).toFixed(2) + ' KB/s';
            }
            return mbps.toFixed(2) + ' MB/s';
        }

        function getStatusLabel(status) {
            const labels = {
                'downloading': '正在下载',
                'paused': '已暂停',
                'queued': '等待中',
                'completed': '已完成',
                'error': '错误',
                'retrying': '重试中'
            };
            return labels[status] || status;
        }

        function updateStats() {
            let active = 0;
            let totalSpeed = 0;
            activeDownloads.forEach(dl => {
                if (dl.status === 'downloading') {
                    active++;
                    totalSpeed += dl.speed || 0;
                }
            });
            document.getElementById('activeCount').innerText = active;
            document.getElementById('totalSpeed').innerText = formatSpeed(totalSpeed);
            document.getElementById('completedCount').innerText = historyDownloads.length;
        }

        async function apiCall(path, options = {}) {
            if (!options.headers) options.headers = {};
            if (typeof AUTH_TOKEN !== 'undefined') {
                options.headers['Authorization'] = `Bearer ${AUTH_TOKEN}`;
            }
            return fetch(`${API_BASE}${path}`, options);
        }

        async function fetchDownloads() {
            try {
                const response = await apiCall('/list');
                if (response.ok) {
                    const downloads = await response.json();
                    activeDownloads.clear();
                    downloads.forEach(dl => activeDownloads.set(dl.id, dl));
                    renderList();
                    updateStats();
                    
                    // Update connection status
                    document.getElementById('statusIndicator').innerHTML = `
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        <span>已连接</span>
                    `;
                    document.getElementById('statusIndicator').className = 'flex items-center space-x-2 px-3 py-1 bg-green-100 text-green-700 rounded-full text-sm font-medium';
                } else {
                    console.error('Fetch downloads failed:', response.status);
                    const statusText = response.status === 401 ? '认证失败 (Token 错误)' : `服务器错误 (${response.status})`;
                    document.getElementById('statusIndicator').innerHTML = `
                        <span class="w-2 h-2 bg-red-500 rounded-full"></span>
                        <span class="text-red-700">${statusText}</span>
                    `;
                }
            } catch (err) {
                console.error('Failed to fetch downloads:', err);
                document.getElementById('statusIndicator').innerHTML = `
                    <span class="w-2 h-2 bg-red-500 rounded-full"></span>
                    <span class="text-red-700">连接断开 (网络错误)</span>
                `;
            }
        }

        async function fetchHistory() {
            try {
                const response = await apiCall('/history');
                if (response.ok) {
                    historyDownloads = await response.json();
                    if (currentView === 'history') renderList();
                    updateStats();
                }
            } catch (err) {
                console.error('Failed to fetch history:', err);
            }
        }

        function renderList() {
            const container = document.getElementById('downloadList');
            const list = currentView === 'active' 
                ? Array.from(activeDownloads.values()).filter(dl => dl.status !== 'completed') 
                : historyDownloads;
            
            if (list.length === 0) {
                container.innerHTML = `
                    <div class="p-12 text-center text-gray-500">
                        <p>${currentView === 'active' ? '暂无进行中的下载' : '暂无历史记录'}</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';
            list.forEach(dl => {
                const totalSize = dl.total_size || 0;
                const downloaded = dl.downloaded || 0;
                const progress = dl.progress !== undefined ? dl.progress.toFixed(1) : (totalSize > 0 ? (downloaded / totalSize * 100).toFixed(1) : 0);
                const item = document.createElement('div');
                item.className = 'p-6 hover:bg-gray-50 transition-colors';
                
                let actions = '';
                if (currentView === 'active') {
                    if (dl.status === 'paused') {
                        actions = `<button onclick="resumeDownload('${dl.id}')" class="p-1 text-blue-600 hover:bg-blue-50 rounded"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /></svg></button>`;
                    } else if (dl.status === 'downloading') {
                        actions = `<button onclick="pauseDownload('${dl.id}')" class="p-1 text-yellow-600 hover:bg-yellow-50 rounded"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 9v6m4-6v6" /></svg></button>`;
                    }
                    actions += `<button onclick="deleteDownload('${dl.id}')" class="p-1 text-red-600 hover:bg-red-50 rounded"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-4v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>`;
                } else {
                    if (dl.file_exists) {
                        actions = `<button onclick="openFile('${dl.id}')" class="text-sm font-medium text-blue-600 hover:underline mr-4">打开文件</button>`;
                        actions += `<button onclick="openFolder('${dl.id}')" class="text-sm font-medium text-blue-600 hover:underline">打开目录</button>`;
                    } else {
                        actions = `<span class="text-xs text-red-500 mr-4 font-medium flex items-center"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>文件已丢失</span>`;
                        actions += `<button onclick="redownload('${dl.id}')" class="text-sm font-medium text-blue-600 hover:underline">重新下载</button>`;
                    }
                }

                item.innerHTML = `
                    <div class="flex items-start justify-between mb-2">
                        <div class="flex-1 min-w-0">
                            <h3 class="font-semibold text-gray-900 truncate" title="${dl.filename || dl.id}">${dl.filename || dl.id}</h3>
                            <p class="text-xs text-gray-500 truncate mt-1">${dl.url}</p>
                        </div>
                        <div class="flex space-x-2 ml-4">
                            ${actions}
                        </div>
                    </div>
                    <div class="flex items-center space-x-4 mb-2">
                        <div class="flex-1 bg-gray-200 rounded-full h-2 overflow-hidden">
                            <div class="bg-blue-600 h-full progress-bar" style="width: ${progress}%"></div>
                        </div>
                        <span class="text-sm font-medium text-gray-700 w-12 text-right">${progress}%</span>
                    </div>
                    <div class="flex items-center justify-between text-xs text-gray-500">
                        <div class="flex items-center space-x-4">
                            <span>${formatSize(downloaded)} / ${formatSize(totalSize)}</span>
                            ${dl.speed > 0 ? `<span class="font-medium text-blue-600">${formatSpeed(dl.speed)}</span>` : ''}
                            ${dl.eta > 0 ? `<span>ETA: ${dl.eta}s</span>` : ''}
                        </div>
                        <span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase ${getStatusColor(dl.status)}">${getStatusLabel(dl.status)}</span>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function getStatusColor(status) {
            switch(status) {
                case 'downloading': return 'bg-blue-100 text-blue-700';
                case 'paused': return 'bg-yellow-100 text-yellow-700';
                case 'completed': return 'bg-green-100 text-green-700';
                case 'error': return 'bg-red-100 text-red-700';
                default: return 'bg-gray-100 text-gray-700';
            }
        }

        async function pauseDownload(id) {
            await apiCall(`/pause?id=${id}`, { method: 'POST' });
            fetchDownloads();
        }

        async function resumeDownload(id) {
            await apiCall(`/resume?id=${id}`, { method: 'POST' });
            fetchDownloads();
        }

        async function deleteDownload(id) {
            const result = await Swal.fire({
                title: '确定要删除吗？',
                text: "这个下载任务将被移除",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: '确定删除',
                cancelButtonText: '取消'
            });

            if (result.isConfirmed) {
                await apiCall(`/delete?id=${id}`, { method: 'DELETE' });
                fetchDownloads();
                Swal.fire({
                    toast: true,
                    position: 'top-end',
                    icon: 'success',
                    title: '已删除任务',
                    showConfirmButton: false,
                    timer: 2000
                });
            }
        }

        async function openFile(id) {
            await apiCall(`/open-file?id=${id}`, { method: 'POST' });
        }

        async function openFolder(id) {
            await apiCall(`/open-folder?id=${id}`, { method: 'POST' });
        }

        async function redownload(id) {
            try {
                const response = await apiCall(`/redownload?id=${id}`, { method: 'POST' });
                if (response.ok) {
                    // Switch to active view to show progress
                    document.getElementById('showActive').click();
                    fetchDownloads();
                    Swal.fire({
                        toast: true, position: 'top-end', icon: 'success', title: '已重新开始下载', showConfirmButton: false, timer: 2000
                    });
                } else {
                    Swal.fire({ icon: 'error', title: '重新下载失败', text: await response.text() });
                }
            } catch (err) {
                Swal.fire({ icon: 'error', title: '重新下载出错', text: err.message });
            }
        }

        document.getElementById('addDownloadForm').onsubmit = async (e) => {
            e.preventDefault();
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return;

            try {
                const response = await apiCall(`/download`, { 
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                if (response.ok) {
                    document.getElementById('urlInput').value = '';
                    fetchDownloads();
                    Swal.fire({
                        toast: true,
                        position: 'top-end',
                        icon: 'success',
                        title: '已添加下载任务',
                        showConfirmButton: false,
                        timer: 2000
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: '添加失败',
                        text: await response.text()
                    });
                }
            } catch (err) {
                Swal.fire({
                    icon: 'error',
                    title: '添加出错',
                    text: err.message
                });
            }
        };

        document.getElementById('showActive').onclick = () => {
            currentView = 'active';
            document.getElementById('showActive').className = 'text-sm font-medium text-blue-600 hover:text-blue-700 px-3 py-1 rounded-md bg-blue-50';
            document.getElementById('showHistory').className = 'text-sm font-medium text-gray-500 hover:text-gray-700 px-3 py-1 rounded-md hover:bg-gray-100';
            document.getElementById('clearHistoryBtn').classList.add('hidden');
            renderList();
        };

        document.getElementById('showHistory').onclick = () => {
            currentView = 'history';
            document.getElementById('showHistory').className = 'text-sm font-medium text-blue-600 hover:text-blue-700 px-3 py-1 rounded-md bg-blue-50';
            document.getElementById('showActive').className = 'text-sm font-medium text-gray-500 hover:text-gray-700 px-3 py-1 rounded-md hover:bg-gray-100';
            document.getElementById('clearHistoryBtn').classList.remove('hidden');
            fetchHistory();
        };

        document.getElementById('clearHistoryBtn').onclick = async () => {
            const result = await Swal.fire({
                title: '确定要清空吗？',
                text: "所有已完成的下载记录将被永久删除",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: '确定清空',
                cancelButtonText: '取消'
            });

            if (result.isConfirmed) {
                try {
                    const response = await apiCall('/clear-history', { method: 'POST' });
                    if (response.ok) {
                        fetchHistory();
                        Swal.fire({
                            toast: true, position: 'top-end', icon: 'success', title: '历史记录已清空', showConfirmButton: false, timer: 2000
                        });
                    } else {
                        Swal.fire({ icon: 'error', title: '清空失败', text: await response.text() });
                    }
                } catch (err) {
                    Swal.fire({ icon: 'error', title: '清空出错', text: err.message });
                }
            }
        };

        // Settings Logic
        const settingsModal = document.getElementById('settingsModal');
        const settingsForm = document.getElementById('settingsForm');
        let currentSettings = null;

        document.getElementById('settingsBtn').onclick = async () => {
            try {
                const response = await apiCall('/settings');
                if (response.ok) {
                    currentSettings = await response.json();
                    const tokenEl = document.getElementById('authTokenDisplay');
                    if (tokenEl) {
                        tokenEl.value = typeof AUTH_TOKEN !== 'undefined' ? AUTH_TOKEN : '';
                    }
                    // Fill form
                    settingsForm.querySelector('[name="general.default_download_dir"]').value = currentSettings.general.default_download_dir;
                    settingsForm.querySelector('[name="general.download_complete_notification"]').checked = currentSettings.general.download_complete_notification;
                    settingsForm.querySelector('[name="general.auto_resume"]').checked = currentSettings.general.auto_resume;
                    settingsForm.querySelector('[name="network.max_concurrent_downloads"]').value = currentSettings.network.max_concurrent_downloads;
                    settingsForm.querySelector('[name="network.max_connections_per_host"]').value = currentSettings.network.max_connections_per_host;
                    settingsForm.querySelector('[name="network.proxy_url"]').value = currentSettings.network.proxy_url || '';
                    
                    settingsModal.classList.remove('hidden');
                }
            } catch (err) {
                Swal.fire({ icon: 'error', title: '获取设置失败', text: err.message });
            }
        };

        const closeSettings = () => settingsModal.classList.add('hidden');
        document.getElementById('closeSettings').onclick = closeSettings;

        document.getElementById('copyAuthToken').onclick = async () => {
            const el = document.getElementById('authTokenDisplay');
            if (!el || !el.value) return;
            try {
                await navigator.clipboard.writeText(el.value);
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: '已复制令牌', showConfirmButton: false, timer: 2000 });
            } catch (e) {
                el.select();
                document.execCommand('copy');
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: '已复制令牌', showConfirmButton: false, timer: 2000 });
            }
        };

        document.getElementById('saveSettings').onclick = async () => {
            if (!currentSettings) return;

            const updatedSettings = {
                ...currentSettings,
                general: {
                    ...currentSettings.general,
                    default_download_dir: settingsForm.querySelector('[name="general.default_download_dir"]').value,
                    download_complete_notification: settingsForm.querySelector('[name="general.download_complete_notification"]').checked,
                    auto_resume: settingsForm.querySelector('[name="general.auto_resume"]').checked,
                },
                network: {
                    ...currentSettings.network,
                    max_concurrent_downloads: parseInt(settingsForm.querySelector('[name="network.max_concurrent_downloads"]').value),
                    max_connections_per_host: parseInt(settingsForm.querySelector('[name="network.max_connections_per_host"]').value),
                    proxy_url: settingsForm.querySelector('[name="network.proxy_url"]').value,
                }
            };

            try {
                const response = await apiCall('/settings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedSettings)
                });
                if (response.ok) {
                    closeSettings();
                    Swal.fire({
                        toast: true, position: 'top-end', icon: 'success', title: '设置已保存', showConfirmButton: false, timer: 2000
                    });
                } else {
                    Swal.fire({ icon: 'error', title: '保存失败', text: await response.text() });
                }
            } catch (err) {
                Swal.fire({ icon: 'error', title: '保存出错', text: err.message });
            }
        };

        // Polling
        setInterval(fetchDownloads, 1000);
        setInterval(fetchHistory, 5000);
        
        // Initial load
        fetchDownloads();
        fetchHistory();

        // Use SSE for real-time updates if available
        function setupSSE() {
            let url = `${API_BASE}/events`;
            if (typeof AUTH_TOKEN !== 'undefined') {
                url += `?token=${AUTH_TOKEN}`;
            }
            const evSource = new EventSource(url);
            evSource.onmessage = (event) => {
                // Handle various event types
                // For now, we just refresh the list to keep it simple
                fetchDownloads();
            };
            evSource.onerror = () => {
                evSource.close();
                setTimeout(setupSSE, 5000); // Retry after 5s
            };
        }
        setupSSE();
    </script>
</body>
</html>
