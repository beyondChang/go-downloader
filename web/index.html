<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Downloader - 下载管理器</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <svg xmlns="http://www.w3.org/2000/svg" class="logo-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10" />
                    </svg>
                </div>
                <h1 class="title">Downloader <span class="title-accent">Web</span></h1>
            </div>
            <div class="header-right">
                <div id="statusIndicator" class="status-indicator connected">
                    <span class="status-dot"></span>
                    <span class="status-text">已连接</span>
                </div>
                <button id="settingsBtn" class="settings-btn" title="设置">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Stats Overview -->
        <div class="stats-grid">
            <div class="stat-card">
                <p class="stat-label">正在下载</p>
                <p id="activeCount" class="stat-value">0</p>
            </div>
            <div class="stat-card">
                <p class="stat-label">总下载速度</p>
                <p id="totalSpeed" class="stat-value">0 MB/s</p>
            </div>
            <div class="stat-card">
                <p class="stat-label">已完成</p>
                <p id="completedCount" class="stat-value">0</p>
            </div>
        </div>

        <!-- Add Download Section -->
        <div class="panel">
            <h2 class="panel-title">添加新下载</h2>
            <form id="addDownloadForm" class="add-form">
                <input type="text" id="urlInput" placeholder="输入下载链接 (URL)" class="url-input">
                <button type="submit" class="btn btn-primary">添加</button>
            </form>
        </div>

        <!-- Downloads List -->
        <div class="panel">
            <div class="panel-header">
                <h2 class="panel-title">任务列表</h2>
                <div class="view-tabs">
                    <button id="clearHistoryBtn" class="btn-clear hidden">清空历史</button>
                    <button id="showActive" class="tab-btn active">正在下载</button>
                    <button id="showHistory" class="tab-btn">历史记录</button>
                </div>
            </div>
            <div id="downloadList" class="download-list">
                <div id="emptyListState" class="empty-state">
                    <p>暂无下载任务</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal-overlay hidden">
        <div class="modal">
            <div class="modal-header">
                <h2 class="modal-title">设置</h2>
                <button id="closeSettings" class="modal-close">
                    <svg xmlns="http://www.w3.org/2000/svg" class="icon" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="settingsForm" class="settings-form">
                    <!-- General Settings -->
                    <section class="settings-section">
                        <h3 class="section-title">常规设置</h3>
                        <div class="setting-row">
                            <div class="setting-info">
                                <label class="setting-label">最大并发下载数</label>
                                <p class="setting-desc">同时进行的下载任务数量</p>
                            </div>
                            <input type="number" id="setting-max_downloads" class="setting-input" min="1" max="10">
                        </div>
                        <div class="setting-row">
                            <div class="setting-info">
                                <label class="setting-label">默认保存目录</label>
                                <p class="setting-desc">下载文件的默认保存位置</p>
                            </div>
                            <input type="text" id="setting-default_dir" class="setting-input">
                        </div>
                    </section>

                    <!-- Network Settings -->
                    <section class="settings-section">
                        <h3 class="section-title">网络设置</h3>
                        <div class="setting-row">
                            <div class="setting-info">
                                <label class="setting-label">代理服务器</label>
                                <p class="setting-desc">HTTP/HTTPS 代理地址 (如 http://127.0.0.1:7890)</p>
                            </div>
                            <input type="text" id="setting-proxy" class="setting-input" placeholder="留空表示不使用代理">
                        </div>
                        <div class="setting-row">
                            <div class="setting-info">
                                <label class="setting-label">连接超时</label>
                                <p class="setting-desc">网络连接超时时间 (秒)</p>
                            </div>
                            <input type="number" id="setting-timeout" class="setting-input" min="5" max="300">
                        </div>
                    </section>

                    <div class="settings-actions">
                        <button type="button" id="cancelSettings" class="btn btn-secondary">取消</button>
                        <button type="submit" class="btn btn-primary">保存设置</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script src="/js/app.js"></script>
</body>
</html>
